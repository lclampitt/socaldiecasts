<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Flag pole -->
  <rect x="4" y="2" width="2.5" height="28" rx="1" fill="#333"/>
  <!-- Checkered flag: 4x3 grid of squares -->
  <!-- Row 1 -->
  <rect x="6.5" y="2" width="6" height="5" fill="#111"/>
  <rect x="12.5" y="2" width="6" height="5" fill="#fff"/>
  <rect x="18.5" y="2" width="6" height="5" fill="#111"/>
  <!-- Row 2 -->
  <rect x="6.5" y="7" width="6" height="5" fill="#fff"/>
  <rect x="12.5" y="7" width="6" height="5" fill="#111"/>
  <rect x="18.5" y="7" width="6" height="5" fill="#fff"/>
  <!-- Row 3 -->
  <rect x="6.5" y="12" width="6" height="5" fill="#111"/>
  <rect x="12.5" y="12" width="6" height="5" fill="#fff"/>
  <rect x="18.5" y="12" width="6" height="5" fill="#111"/>
  <!-- Flag outline -->
  <rect x="6.5" y="2" width="18" height="15" rx="1" fill="none" stroke="#555" stroke-width="0.5"/>
</svg>
